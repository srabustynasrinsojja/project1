# ============================================================
# LearnSpace - Docker Compose (Development)
# ============================================================
version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: learnspace_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - learnspace_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnspace_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: mysql
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - learnspace_net

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnspace_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - learnspace_net

  # Redis (for session/cache - optional)
  redis:
    image: redis:7-alpine
    container_name: learnspace_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - learnspace_net

volumes:
  mysql_data:

networks:
  learnspace_net:
    driver: bridge
